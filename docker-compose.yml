#preproducción

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airconnect_backend_qa
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    # Usamos env_file para cargar automáticamente todo lo que esté en tu .env
    env_file:
      - .env
    # El comando está bien para pruebas, pero recuerda que artisan serve no es para producción
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - airconnect_network

networks:
  airconnect_network:
    driver: bridge