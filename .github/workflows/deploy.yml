name: DockerImageBuild

on:
  push:
    branches: [proyecto-integrador]
  pull_request:
    branches: [proyecto-integrador]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/proyecto-integrador:latest
          
  deploy:
    runs-on: ubuntu-latest
    needs: build
    #if: github.event_name == 'push' # Evita que los Pull Requests disparen un despliegue real
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -f -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}