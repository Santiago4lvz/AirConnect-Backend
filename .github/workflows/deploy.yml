name: DockerImageBuild

on:
  push:
    branches: [proyecto-integrador]
  pull_request:
    branches: [proyecto-integrador]

jobs:
  # 1. PRIMERO PROBAMOS (Si falla aquí, no perdemos tiempo construyendo la imagen)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, pdo_sqlite, sqlsrv, pdo_sqlsrv
          coverage: none

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress

  test_integration: 
        - name: Run Tests
        - run: php artisan test


  # 2. LUEGO CONSTRUIMOS (Solo si los tests pasaron)
  build:
    runs-on: ubuntu-latest
    needs: test # Obliga a que pasen los tests primero
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/proyecto-integrador:latest

  # 3. FINALMENTE DESPLEGAMOS
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' # Solo despliega cuando haces push, no en Pull Requests
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -f -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}